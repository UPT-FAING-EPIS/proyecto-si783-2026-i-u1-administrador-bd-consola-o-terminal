name: Seguridad y Calidad de Código

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  test:
    name: Tests Unitarios (Python 3.8+)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ejecutar tests
        run: |
          python -m pytest tests/ -v --tb=short

  snyk-scan:
    name: Escaneo de Vulnerabilidades
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ejecutar Snyk para buscar vulnerabilidades
        uses: snyk/actions/python@master
        continue-on-error: true # Para que no bloquee tu avance si encuentra algo, pero que el reporte aparezca
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
